<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Login</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>Sign In</h1>

        <form id="loginForm">

            <input
            type="email"
            id="email"
            placeholder="Email or phone number"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <button type="submit">
                Sign In
            </button>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember me

                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>

        </form>

        <p class="signup">

            New to Netflix?

            <a href="signup.html">

                Sign up now

            </a>

        </p>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
